name: Deploy to Cloudways

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy to staging
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy staging over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USER }}
          password: ${{ secrets.CLOUDWAYS_PASSWORD }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.CLOUDWAYS_PATH }}

            export APP_ENV=prod
            export APP_DEBUG=0

            git fetch origin ${{ secrets.CLOUDWAYS_BRANCH }}
            git reset --hard origin/${{ secrets.CLOUDWAYS_BRANCH }}

            APP_ENV=prod APP_DEBUG=0 composer install --no-dev --optimize-autoloader --no-interaction

            APP_ENV=prod APP_DEBUG=0 php bin/console tailwind:build --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console asset-map:compile --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup --env=prod

            chmod -R ug+rw var

  deploy-production:
    name: Deploy to production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CLOUDWAYS_HOST }}
          username: ${{ secrets.CLOUDWAYS_USER }}
          password: ${{ secrets.CLOUDWAYS_PASSWORD }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.CLOUDWAYS_PATH }}

            export APP_ENV=prod
            export APP_DEBUG=0

            git fetch origin ${{ secrets.CLOUDWAYS_BRANCH }}
            git reset --hard origin/${{ secrets.CLOUDWAYS_BRANCH }}

            APP_ENV=prod APP_DEBUG=0 composer install --no-dev --optimize-autoloader --no-interaction

            APP_ENV=prod APP_DEBUG=0 php bin/console tailwind:build --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console asset-map:compile --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:clear --env=prod
            APP_ENV=prod APP_DEBUG=0 php bin/console cache:warmup --env=prod

            chmod -R ug+rw var
